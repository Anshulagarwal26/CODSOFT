<!DOCTYPE html>
<html>
  <head>
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="calculator" role="application" aria-label="Calculator">
      <div class="display" aria-live="polite" aria-atomic="true" id="display">
        0
      </div>

      <div class="keypad" aria-label="Calculator keypad">
        <button class="key key--function" data-action="clear">C</button>
        <button class="key key--function" data-action="back">⌫</button>
        <button class="key key--operator" data-operator="/">÷</button>
        <button class="key key--operator" data-operator="*">×</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key key--operator" data-operator="-">−</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key key--operator" data-operator="+">+</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key key--equals" data-action="equals">=</button>

        <button class="key key--zero" data-value="0">0</button>
        <button class="key" data-action="dot">.</button>
        <span aria-hidden="true"></span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
